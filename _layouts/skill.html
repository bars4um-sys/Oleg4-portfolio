---
layout: default
---
{% assign skill_id = page.skill_id | default: page.title | slugify %}
<div class="skill-page" data-skill="{{ skill_id }}">
  <div class="skill-hero">
    <div class="hero-content">
      <span class="skill-icon" style="font-size: 4rem; display: block; margin-bottom: 1.5rem;">{{ page.icon }}</span>
      <h1>{{ page.title }}</h1>
      <p class="hero-subtitle">{{ page.subtitle }}</p>
      <div class="hero-cta">
        <a href="#portfolio" class="btn btn-primary">Смотреть работы</a>
        <a href="{{ site.social.telegram }}" class="btn btn-secondary">Заказать</a>
      </div>
    </div>
  </div>

  <div class="skill-content">
    {{ content }}
  </div>
</div>
