<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1f2e" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- SnakeCat silhouette: cat head + snake body -->
  <!-- Cat ears -->
  <polygon points="65,45 55,20 80,40" fill="#00d4aa" opacity="0.9"/>
  <polygon points="135,45 145,20 120,40" fill="#00d4aa" opacity="0.9"/>
  
  <!-- Cat head -->
  <ellipse cx="100" cy="65" rx="35" ry="30" fill="#0a0e1a" stroke="#00d4aa" stroke-width="2"/>
  
  <!-- Cat eyes -->
  <ellipse cx="85" cy="60" rx="6" ry="7" fill="#00d4aa"/>
  <ellipse cx="115" cy="60" rx="6" ry="7" fill="#00d4aa"/>
  <ellipse cx="85" cy="60" rx="2.5" ry="6" fill="#0a0e1a"/>
  <ellipse cx="115" cy="60" rx="2.5" ry="6" fill="#0a0e1a"/>
  
  <!-- Cat nose -->
  <polygon points="100,68 96,73 104,73" fill="#7c3aed"/>
  
  <!-- Cat whiskers -->
  <line x1="60" y1="68" x2="88" y2="72" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="75" x2="88" y2="75" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <line x1="140" y1="68" x2="112" y2="72" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  <line x1="142" y1="75" x2="112" y2="75" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
  
  <!-- Snake body (S-curve from cat neck down) -->
  <path d="M 100,90 C 100,110 70,120 80,140 C 90,160 120,150 130,170 C 135,180 120,185 110,180" 
        fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Snake tail curl -->
  <path d="M 110,180 C 100,175 95,185 105,188" 
        fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Scales pattern on snake body -->
  <circle cx="85" cy="130" r="2" fill="#00d4aa" opacity="0.4"/>
  <circle cx="95" cy="145" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="115" cy="160" r="2" fill="#00d4aa" opacity="0.4"/>
</svg>
